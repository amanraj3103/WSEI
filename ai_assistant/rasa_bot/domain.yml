version: "3.1"

intents:
  - greet
  - goodbye
  - affirm
  - deny
  - lead_form
  - provide_name
  - provide_email
  - provide_phone
  - provide_country
  - provide_service
  - provide_date
  - provide_notes
  - help
  - out_of_scope

entities:
  - name
  - email
  - phone
  - country
  - service_type
  - date
  - time
  - notes

slots:
  name:
    type: text
    mappings:
    - type: from_entity
      entity: name
  email:
    type: text
    mappings:
    - type: from_entity
      entity: email
  phone:
    type: text
    mappings:
    - type: from_entity
      entity: phone
  country:
    type: text
    mappings:
    - type: from_entity
      entity: country
  service_type:
    type: categorical
    values:
      - study
      - work
      - visa_help
    mappings:
    - type: from_entity
      entity: service_type
  preferred_date:
    type: text
    mappings:
    - type: from_entity
      entity: date
  preferred_time:
    type: text
    mappings:
    - type: from_entity
      entity: time
  notes:
    type: text
    mappings:
    - type: from_entity
      entity: notes

forms:
  lead_form:
    name:
      - type: from_entity
        entity: name
    email:
      - type: from_entity
        entity: email
    phone:
      - type: from_entity
        entity: phone
    country:
      - type: from_entity
        entity: country
    service_type:
      - type: from_entity
        entity: service_type
    preferred_date:
      - type: from_entity
        entity: date
    preferred_time:
      - type: from_entity
        entity: time
    notes:
      - type: from_entity
        entity: notes

responses:
  utter_greet:
    - text: "Hello! 👋 I'm your lead assistant. I can help you schedule a consultation call. Would you like to provide your information so I can set up a meeting for you?"

  utter_goodbye:
    - text: "Thank you for your time! Have a great day! 👋"

  utter_lead_form_start:
    - text: "Great! I'll help you schedule a consultation. Let me collect some information from you. What's your full name?"

  utter_ask_name:
    - text: "What's your full name?"

  utter_ask_email:
    - text: "What's your email address?"

  utter_ask_phone:
    - text: "What's your phone number?"

  utter_ask_country:
    - text: "Which country are you interested in?"

  utter_ask_service:
    - text: "What type of service are you looking for?\n- Study\n- Work\n- Visa Help"

  utter_ask_date:
    - text: "What's your preferred date for the call? (e.g., tomorrow, next Monday, 15th December)"

  utter_ask_time:
    - text: "What's your preferred time for the call? (e.g., 2 PM, 10:00 AM)"

  utter_ask_notes:
    - text: "Any additional notes or questions you'd like to share?"

  utter_lead_form_complete:
    - text: "Perfect! I have all your information. Let me process this and send you a booking link for your consultation call. This will just take a moment..."

  utter_help:
    - text: "I'm here to help you schedule a consultation call. I'll ask you a few questions to collect your information and then send you a booking link. You can say 'stop' at any time to end the conversation."

  utter_out_of_scope:
    - text: "I'm sorry, I can only help with scheduling consultation calls. If you have other questions, please contact our support team."

session_config:
  session_expiration_time: 60
  carry_over_slots_to_new_session: true 