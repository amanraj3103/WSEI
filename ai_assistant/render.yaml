services:
  - type: web
    name: whatsapp-lead-assistant
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main_simple.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.8.18
      - key: PORT
        value: 8000
    healthCheckPath: /health
    autoDeploy: true 